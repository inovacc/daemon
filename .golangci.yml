# https://golangci-lint.run/docs/welcome/install/

version: "2"

run:
  # 5m, not 2m: a WARM run takes ~30s, but a COLD one (fresh cache, e.g. right after a
  # dependency bump) has to analyze everything and can exceed 2m with gosec enabled —
  # which would fail CI spuriously on any cache miss.
  timeout: 5m

linters:
  default: all
  enable:
    - govet
    - errcheck
    - bodyclose
    - copyloopvar
    - dogsled
    - errorlint
    - gocheckcompilerdirectives
    - gocritic
    - goprintffuncname
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - unused

  disable:
    - tagliatelle
    - gochecknoglobals
    - mnd
    - testpackage
    - varnamelen
    - paralleltest
    - gochecknoinits
    - funlen
    - cyclop
    - err113
    - wsl
    - exhaustruct
    - forcetypeassert
    - funcorder
    - gocognit
    - godot
    - godox
    - gosmopolitan
    - intrange
    - ireturn
    - lll
    - nestif
    - nlreturn
    - noctx
    - noinlineerr
    - nonamedreturns
    - perfsprint
    - revive
    - tagalign
    - testifylint
    - thelper
    - usetesting
    - wrapcheck
    - depguard
    - dupl
    - goconst
    - whitespace

  settings:
    # gocyclo re-enabled at a lenient threshold: guards against runaway complexity
    # without churning the current (flat) code. Ratchet down over time.
    gocyclo:
      min-complexity: 15

  exclusions:
    rules:
      # G204: this module's purpose is to spawn processes. Every exec launches the
      # program's OWN executable (self re-exec / worker) or a fixed OS command
      # (taskkill) via an arg SLICE — never a shell string, never consumer input.
      # The security audit confirmed no injection surface; gosec cannot see that.
      - linters: [gosec]
        text: 'G204'
      # gosec permission/overflow checks on test fixtures are noise: tests
      # deliberately create files/dirs with assorted modes to exercise error paths.
      - path: '_test\.go'
        linters: [gosec]
      # Some godoc examples illustrate entry points that spawn a detached process
      # (Start), block until cancelled (RunMonitor), or depend on machine state
      # (Stop) — they compile and render on pkg.go.dev but cannot assert a
      # deterministic Output. The runnable examples in the file keep their Output.
      - path: 'example_test\.go'
        linters: [testableexamples]
