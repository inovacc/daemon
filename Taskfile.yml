version: '3'

# daemon is a library module (no main package). These tasks cover quality and
# dependency hygiene only; releases are plain git tags that consumers `go get`.
vars:
  COVERAGE_FILE: coverage.out

tasks:
  # === INFORMATION ===
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # === TEST TASKS ===
  test:
    desc: Run all tests with race detector + coverage
    cmds:
      - go test -race -coverprofile={{ .COVERAGE_FILE }} ./...

  test:coverage:
    desc: Generate HTML coverage report
    deps: [test]
    cmds:
      - go tool cover -html={{ .COVERAGE_FILE }} -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test:cover:
    desc: Run tests and show total coverage percentage
    cmds:
      - go test -coverprofile={{ .COVERAGE_FILE }} ./...
      - cmd: go tool cover -func={{ .COVERAGE_FILE }} | findstr "total:"
        platforms: [windows]
      - cmd: go tool cover -func={{ .COVERAGE_FILE }} | grep "total:"
        platforms: [linux, darwin]

  # === CODE QUALITY ===
  fmt:
    desc: Format all Go code
    cmds:
      - go fmt ./...
      - goimports -w .

  vet:
    desc: Run go vet static analysis
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run linter and auto-fix issues
    cmds:
      - golangci-lint run --fix ./...

  build:
    desc: Type-check / compile every package (no binary is produced — library module)
    cmds:
      - go build ./...

  check:
    desc: Run all quality checks (fmt, vet, lint, build, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: build
      - task: test

  # === DEPENDENCY MANAGEMENT ===
  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy
      - go mod verify

  deps:upgrade:
    desc: Upgrade all dependencies to latest versions
    cmds:
      - go get -u ./...
      - go mod tidy
      - go mod verify

  # === CLEANUP ===
  clean:
    desc: Clean coverage artifacts
    cmds:
      - rm -f {{ .COVERAGE_FILE }} coverage.html
